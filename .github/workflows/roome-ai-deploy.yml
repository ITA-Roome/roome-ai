name: roome-ai-server CI CD

on:
    push:
        branches: ['develop']

env:
    AWS_REGION: ap-northeast-2
    ECR_REPOSITORY: ita-roome/roome-ai

permissions:
    id-token: write
    contents: read

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        outputs:
            image_uri: ${{ steps.meta.outputs.image_uri }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v3
              with:
                  role-to-assume: ${{ secrets.ARN_ECR_PUSH_ROLE }}
                  role-session-name: ecrPrivatePushRole
                  aws-region: ${{ env.AWS_REGION }}
                  audience: sts.amazonaws.com

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Prepare image tags
              id: meta
              run: |
                  REGISTRY="${{ steps.login-ecr.outputs.registry }}"
                  REPO="${{ env.ECR_REPOSITORY }}"
                  SHA_TAG="${{ github.sha }}"
                  echo "image_uri=${REGISTRY}/${REPO}:${SHA_TAG}" >> $GITHUB_OUTPUT
                  echo "tags=${REGISTRY}/${REPO}:${SHA_TAG},${REGISTRY}/${REPO}:latest" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & Push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Deploy on EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      set -e
                      cd ~/roome-ai

                      # 1. 배포용 이미지 태그 저장
                      echo "IMAGE=${{ needs.build-and-push.outputs.image_uri }}" > .deploy.env

                      # 2. Secrets 기반으로 환경변수 파일 덮어쓰기
                      echo "${{ secrets.ROOME_AI_ENV }}" > .env

                      # 3. ECR 로그인 & 최신 이미지 Pull
                      REGISTRY="$(aws sts get-caller-identity --query 'Account' --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
                      aws ecr get-login-password --region ${{ env.AWS_REGION }} \
                        | docker login --username AWS --password-stdin "$REGISTRY"

                      docker compose --env-file .deploy.env pull
                      docker compose --env-file .deploy.env up -d

                      docker image prune -af || true
                      docker container prune -f || true
